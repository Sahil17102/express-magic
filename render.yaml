services:
  - type: web
    runtime: static
    name: express-magic
    rootDir: landing
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_CLIENT_APP_URL
        value: https://express-magic-client.onrender.com
      - key: VITE_AUTH_APP_URL
        value: https://express-magic-client.onrender.com/login
      - key: VITE_ADMIN_APP_URL
        value: https://express-magic-admin.onrender.com
      - key: VITE_ADMIN_AUTH_URL
        value: https://express-magic-admin.onrender.com/#/auth/signin
      - key: VITE_API_URL
        value: https://express-magic-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: express-magic-client
    rootDir: courier-cart-client
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://express-magic-backend.onrender.com/api
      - key: VITE_APP_SOCKET_URL
        value: https://express-magic-backend.onrender.com
      - key: VITE_GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: VITE_PUBLIC_GEOAPIFY_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: static
    name: express-magic-admin
    rootDir: admin-dashboard
    buildCommand: npm ci --legacy-peer-deps && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://express-magic-backend.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://express-magic-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: docker
    name: express-magic-backend
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        value: https://express-magic-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://express-magic.onrender.com,https://express-magic-client.onrender.com,https://express-magic-admin.onrender.com
      - key: FRONTEND_URL
        value: https://express-magic-client.onrender.com
      - key: AUTH_OTP_DELIVERY
        value: screen
      - key: AUTO_MIGRATE_ON_START
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: ACCESS_TOKEN_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: COURIER_SECRET_KEY
        sync: false
      - key: ADMIN_SEED_EMAIL
        sync: false
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ADMIN_FORCE_PASSWORD_RESET
        value: "false"
